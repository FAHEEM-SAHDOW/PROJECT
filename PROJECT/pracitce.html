<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>90 Day Uptime</title>
</head>

<body class="bg-gray-100 flex justify-center p-6">

    <div class="w-full max-w-5xl mt-12">

        <h2 class="text-xl font-bold text-gray-900">
            90-Day Uptime
        </h2>

        <div class="mt-6 rounded-xl border border-gray-200 bg-white p-6">

            <!-- uptime bars -->
            <div class="flex gap-1 overflow-x-auto">

                <!-- green (uptime) -->
                <div class="h-8 w-2 rounded-sm bg-green-500" title="100% uptime"></div>


                <!-- degraded -->
                <div class="h-8 w-3 rounded-sm bg-yellow-400" title="Degraded"></div>

                <!-- more uptime -->
                <div class="h-8 w-2 rounded-sm bg-green-500"></div>
                <div class="h-8 w-2 rounded-sm bg-green-500"></div>
                <div class="h-8 w-2 rounded-sm bg-green-500"></div>
                <div class="h-8 w-2 rounded-sm bg-green-500"></div>
                <div class="h-8 w-2 rounded-sm bg-green-500"></div>

            </div>

            <!-- labels -->
            <div class="mt-4 flex justify-between text-sm text-gray-500">
                <span>90 days ago</span>
                <span>Today</span>
            </div>

        </div>
    </div>

</body>

</html>
